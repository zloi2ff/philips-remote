<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Philips Remote</title>

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Remote">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            overscroll-behavior: none;
            touch-action: manipulation;
            background: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            margin: 0;
            padding: 0;
            color: white;
        }

        .page {
            display: none;
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            overflow-y: hidden;
            padding: 10px 16px 40px;
            padding-top: calc(env(safe-area-inset-top, 10px) + 5px);
            flex-direction: column;
            justify-content: space-between;
        }

        .page.active {
            display: flex;
        }

        .page.expanded {
            overflow-y: auto;
            justify-content: flex-start;
            padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
        }

        .main-content {
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: space-evenly;
            gap: 0;
        }

        .main-content > * {
            margin-bottom: 0;
        }

        .page.expanded .main-content {
            flex: none;
            justify-content: flex-start;
            gap: 12px;
        }

        /* Top header */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-center {
            text-align: center;
            flex: 1;
        }

        .header-center h1 {
            font-size: 13px;
            margin: 0 0 4px 0;
            color: #555;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .status {
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 9px;
            display: inline-block;
        }

        .status.connected { background: rgba(46, 204, 113, 0.15); color: #2ecc71; }
        .status.error { background: rgba(231, 76, 60, 0.15); color: #e74c3c; }
        .status.scanning { background: rgba(52, 152, 219, 0.15); color: #3498db; }

        /* Buttons */
        .btn {
            background: linear-gradient(180deg, #1a1a28 0%, #12121a 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active,
        .btn.flash {
            transform: scale(0.92);
            background: linear-gradient(180deg, #3498db 0%, #2980b9 100%) !important;
        }

        .btn.power {
            background: linear-gradient(180deg, #c0392b 0%, #962020 100%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            flex-shrink: 0;
        }

        .btn.power:active {
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
        }

        /* Volume slider */
        .volume-row {
            margin-bottom: 12px;
        }

        .volume-slider {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.02);
            padding: 12px 15px;
            border-radius: 16px;
        }

        .volume-slider input {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #1a1a28;
            border-radius: 3px;
            outline: none;
        }

        .volume-slider input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #3498db;
            border-radius: 50%;
            cursor: pointer;
        }

        .volume-slider span {
            color: #666;
            font-size: 12px;
        }

        .volume-value {
            min-width: 24px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #3498db;
        }

        /* Navigation row */
        .nav-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .nav-row .btn {
            height: 42px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Main controls */
        .main-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        /* Side controls */
        .side-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 52px;
        }

        .side-controls .btn {
            width: 52px;
            height: 48px;
            font-size: 18px;
            font-weight: 300;
        }

        .side-controls .btn.mute {
            font-size: 10px;
            font-weight: 500;
        }

        .side-controls .label {
            font-size: 8px;
            color: #555;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2px;
        }

        /* D-pad */
        .dpad-container {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .dpad {
            display: grid;
            grid-template-columns: 58px 58px 58px;
            grid-template-rows: 58px 58px 58px;
            gap: 4px;
        }

        .dpad .btn {
            width: 58px;
            height: 58px;
            font-size: 20px;
        }

        .dpad .btn.ok {
            background: linear-gradient(180deg, #3498db 0%, #2980b9 100%);
            border-radius: 50%;
            font-size: 14px;
            font-weight: 600;
            border: none;
        }

        .dpad .empty {
            background: transparent;
        }

        /* Action row */
        .action-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .action-row .btn {
            height: 42px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Expand button */
        .expand-btn {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            color: #666;
            font-size: 11px;
            padding: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: auto;
            flex-shrink: 0;
        }

        .page.expanded .expand-btn {
            margin-top: 12px;
        }

        .expand-btn:active {
            background: rgba(255,255,255,0.06);
        }

        .expand-btn .arrow {
            transition: transform 0.3s;
            font-size: 10px;
        }

        .expand-btn.expanded .arrow {
            transform: rotate(180deg);
        }

        /* Collapsible */
        .collapsible {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .collapsible.expanded {
            max-height: 700px;
        }

        .collapsible-content {
            padding-top: 10px;
        }

        .section {
            margin-bottom: 10px;
        }

        .section-title {
            font-size: 8px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 6px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* Playback */
        .playback-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 6px;
        }

        .playback-row .btn {
            height: 38px;
            font-size: 13px;
        }

        .playback-row2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .playback-row2 .btn {
            height: 34px;
            font-size: 10px;
        }

        /* Sources */
        .sources {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }

        .sources .btn {
            font-size: 9px;
            height: 34px;
            padding: 4px;
        }

        /* Color buttons */
        .color-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .color-row .btn {
            height: 32px;
            border: none;
        }

        .btn.color-red { background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%); }
        .btn.color-green { background: linear-gradient(180deg, #27ae60 0%, #1e8449 100%); }
        .btn.color-yellow { background: linear-gradient(180deg, #f1c40f 0%, #d4ac0d 100%); }
        .btn.color-blue { background: linear-gradient(180deg, #3498db 0%, #2980b9 100%); }

        /* Settings button */
        .btn.settings {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a28;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            border: 1px solid rgba(255,255,255,0.1);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin: 0 0 20px 0;
            font-size: 18px;
            text-align: center;
        }

        .modal label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .modal input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #12121a;
            color: white;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }

        .modal input:focus {
            border-color: #3498db;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons .btn {
            flex: 1;
            height: 44px;
            font-size: 14px;
        }

        .modal-buttons .btn.primary {
            background: linear-gradient(180deg, #3498db 0%, #2980b9 100%);
            border: none;
        }

        /* Discovery */
        .discover-btn {
            width: 100%;
            height: 44px;
            font-size: 14px;
            margin-bottom: 16px;
            background: linear-gradient(180deg, #27ae60 0%, #1e8449 100%);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .discover-btn:active {
            transform: scale(0.97);
        }

        .discover-btn:disabled {
            opacity: 0.5;
        }

        .tv-list {
            margin-bottom: 16px;
        }

        .tv-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #12121a;
            border-radius: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.15s;
        }

        .tv-item:active {
            transform: scale(0.97);
            border-color: #3498db;
        }

        .tv-item.selected {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.08);
        }

        .tv-item-info {
            flex: 1;
        }

        .tv-item-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .tv-item-ip {
            font-size: 11px;
            color: #888;
        }

        .tv-item-check {
            color: #2ecc71;
            font-size: 18px;
            display: none;
        }

        .tv-item.selected .tv-item-check {
            display: block;
        }

        .divider {
            text-align: center;
            color: #555;
            font-size: 11px;
            margin: 16px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .current-tv {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-bottom: 16px;
            padding: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .current-tv strong {
            color: #2ecc71;
        }

        /* Setup screen */
        .setup-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 900;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .setup-screen.active {
            display: flex;
        }

        .setup-screen h1 {
            font-size: 22px;
            margin: 0 0 8px 0;
        }

        .setup-screen p {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin: 0 0 30px 0;
        }

        .setup-screen .discover-btn {
            width: 100%;
            max-width: 280px;
            height: 50px;
            font-size: 16px;
        }

        .setup-screen .divider {
            width: 100%;
            max-width: 280px;
        }

        .setup-manual {
            width: 100%;
            max-width: 280px;
        }

        .setup-manual input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #1a1a28;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
            text-align: center;
        }

        .setup-manual input:focus {
            border-color: #3498db;
        }

        .setup-manual .btn.primary {
            width: 100%;
            height: 44px;
            font-size: 14px;
            background: linear-gradient(180deg, #3498db 0%, #2980b9 100%);
            border: none;
            border-radius: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <!-- Setup Screen (shown when no TV configured) -->
    <div class="setup-screen" id="setupScreen">
        <h1>Philips Remote</h1>
        <p>Find your TV on the network or enter IP manually</p>

        <button class="discover-btn" id="setupScanBtn" onclick="startDiscovery('setup')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.4-2.4 3.8-5.5 3.8-8.2C24 5.4 18.6 0 12 0S0 5.4 0 12c0 2.7 1.4 5.8 3.8 8.2"/>
                <path d="M16.9 16.9A7 7 0 0 0 19 12a7 7 0 0 0-7-7 7 7 0 0 0-7 7 7 7 0 0 0 2.1 4.9"/>
            </svg>
            Scan Network
        </button>

        <div class="tv-list" id="setupTvList"></div>

        <div class="divider">or enter manually</div>

        <div class="setup-manual">
            <input type="text" id="setupIpInput" placeholder="192.168.1.100" inputmode="decimal">
            <button class="btn primary" onclick="manualConnect('setup')">Connect</button>
        </div>
    </div>

    <!-- Main Remote -->
    <div class="page active" id="tvPage">
        <div class="main-content">
            <div class="top-header">
                <button class="btn power" onclick="sendKey('Standby')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 2v10M18.4 6.6a9 9 0 1 1-12.8 0"/>
                    </svg>
                </button>
                <div class="header-center">
                    <h1 id="tvTitle">PHILIPS TV</h1>
                    <div id="tvStatus" class="status connected">Connected</div>
                </div>
                <button class="btn settings" onclick="openSettings()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
                    </svg>
                </button>
            </div>

            <div class="volume-row">
                <div class="volume-slider">
                    <span>🔈</span>
                    <input type="range" id="volumeSlider" min="1" max="60" value="30" onchange="setVolume(this.value)">
                    <span class="volume-value" id="volumeValue">30</span>
                </div>
            </div>

            <div class="nav-row">
                <button class="btn" onclick="sendKey('Home')">Home</button>
                <button class="btn" onclick="sendKey('Source')">Source</button>
                <button class="btn" onclick="sendKey('Options')">Options</button>
            </div>

            <div class="main-controls">
                <div class="side-controls">
                    <div class="label">Vol</div>
                    <button class="btn" onclick="sendKey('VolumeUp')">+</button>
                    <button class="btn mute" onclick="sendKey('Mute')">MUTE</button>
                    <button class="btn" onclick="sendKey('VolumeDown')">−</button>
                </div>

                <div class="dpad-container">
                    <div class="dpad">
                        <div class="empty"></div>
                        <button class="btn" onclick="sendKey('CursorUp')">▲</button>
                        <div class="empty"></div>
                        <button class="btn" onclick="sendKey('CursorLeft')">◀</button>
                        <button class="btn ok" onclick="sendKey('Confirm')">OK</button>
                        <button class="btn" onclick="sendKey('CursorRight')">▶</button>
                        <div class="empty"></div>
                        <button class="btn" onclick="sendKey('CursorDown')">▼</button>
                        <div class="empty"></div>
                    </div>
                </div>

                <div class="side-controls">
                    <div class="label">Ch</div>
                    <button class="btn" onclick="sendKey('ChannelStepUp')">+</button>
                    <button class="btn mute" onclick="sendKey('Info')">INFO</button>
                    <button class="btn" onclick="sendKey('ChannelStepDown')">−</button>
                </div>
            </div>

            <div class="action-row">
                <button class="btn" onclick="sendKey('Back')">← Back</button>
                <button class="btn" onclick="sendKey('Find')">Search</button>
                <button class="btn" onclick="sendKey('Adjust')">Adjust</button>
            </div>
        </div>

        <button class="expand-btn" id="tvExpandBtn" onclick="toggleExpand('tv')">
            <span>More controls</span>
            <span class="arrow">▼</span>
        </button>

        <div class="collapsible" id="tvCollapsible">
            <div class="collapsible-content">
                <div class="section">
                    <div class="section-title">Playback</div>
                    <div class="playback-row">
                        <button class="btn" onclick="sendKey('Rewind')">⏪</button>
                        <button class="btn" onclick="sendKey('Play')">▶</button>
                        <button class="btn" onclick="sendKey('Pause')">⏸</button>
                        <button class="btn" onclick="sendKey('FastForward')">⏩</button>
                    </div>
                    <div class="playback-row2">
                        <button class="btn" onclick="sendKey('Stop')">⏹ Stop</button>
                        <button class="btn" onclick="sendKey('Record')">⏺ Rec</button>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">Sources</div>
                    <div class="sources" id="sourcesGrid">
                        <!-- Populated dynamically from /api/{v}/sources -->
                        <button class="btn" onclick="setSource(11)">TV</button>
                        <button class="btn" onclick="setSource(17)">SAT</button>
                        <button class="btn" onclick="setSource(28)">Game</button>
                        <button class="btn" onclick="setSource(29)">Theater</button>
                        <button class="btn" onclick="setSource(30)">HDMI 3</button>
                        <button class="btn" onclick="setSource(31)">HDMI 4</button>
                        <button class="btn" onclick="setSource(33)">Blu-ray</button>
                        <button class="btn" onclick="setSource(32)">SCART</button>
                    </div>
                </div>

                <div class="color-row">
                    <button class="btn color-red" onclick="sendKey('RedColour')"></button>
                    <button class="btn color-green" onclick="sendKey('GreenColour')"></button>
                    <button class="btn color-yellow" onclick="sendKey('YellowColour')"></button>
                    <button class="btn color-blue" onclick="sendKey('BlueColour')"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>Settings</h2>

            <div id="currentTvInfo" class="current-tv" style="display:none;"></div>

            <button class="discover-btn" id="modalScanBtn" onclick="startDiscovery('modal')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.4-2.4 3.8-5.5 3.8-8.2C24 5.4 18.6 0 12 0S0 5.4 0 12c0 2.7 1.4 5.8 3.8 8.2"/>
                    <path d="M16.9 16.9A7 7 0 0 0 19 12a7 7 0 0 0-7-7 7 7 0 0 0-7 7 7 7 0 0 0 2.1 4.9"/>
                </svg>
                Scan Network
            </button>

            <div class="tv-list" id="modalTvList"></div>

            <div class="divider">or enter TV IP manually</div>

            <label>TV IP Address</label>
            <input type="text" id="manualIpInput" placeholder="192.168.1.100" inputmode="decimal">

            <div class="modal-buttons">
                <button class="btn" onclick="closeSettings()">Cancel</button>
                <button class="btn primary" onclick="manualConnect('modal')">Connect</button>
            </div>
        </div>
    </div>

    <script>
        const VOLUME_POLL_INTERVAL = 10000; // ms
        let pollTimer = null;

        // Server URL (for iOS app connecting to remote server)
        function getServerUrl() {
            if (window.location.protocol !== 'file:') return '';
            const ip = localStorage.getItem('serverIp');
            const port = localStorage.getItem('serverPort') || '8888';
            return ip ? `http://${ip}:${port}` : '';
        }

        function getApiBase() {
            const version = localStorage.getItem('tvApiVersion') || '1';
            return `${getServerUrl()}/api/${version}`;
        }

        // --- TV Discovery & Configuration ---

        async function loadConfig() {
            try {
                const res = await fetch(`${getServerUrl()}/config`);
                if (!res.ok) return null;
                return await res.json();
            } catch {
                return null;
            }
        }

        async function saveConfig(ip, port, apiVersion) {
            try {
                await fetch(`${getServerUrl()}/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip, port: port || 1925, apiVersion: apiVersion || 1 })
                });
            } catch {}
        }

        async function startDiscovery(context) {
            const btnId = context === 'setup' ? 'setupScanBtn' : 'modalScanBtn';
            const listId = context === 'setup' ? 'setupTvList' : 'modalTvList';
            const btn = document.getElementById(btnId);
            const list = document.getElementById(listId);

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Scanning...';
            list.innerHTML = '';

            try {
                const res = await fetch(`${getServerUrl()}/discover`);
                const data = await res.json();

                if (data.tvs && data.tvs.length > 0) {
                    list.innerHTML = data.tvs.map(tv => `
                        <div class="tv-item" onclick="selectTv('${tv.ip}', ${tv.port}, ${tv.apiVersion || 1}, '${tv.name}', this, '${context}')">
                            <div class="tv-item-info">
                                <div class="tv-item-name">${tv.name || 'Philips TV'}</div>
                                <div class="tv-item-ip">${tv.ip}:${tv.port}${tv.model ? ' — ' + tv.model : ''} · API v${tv.apiVersion || 1}</div>
                            </div>
                            <div class="tv-item-check">✓</div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div style="text-align:center;color:#888;font-size:12px;padding:12px;">No TVs found on the network</div>';
                }
            } catch {
                list.innerHTML = '<div style="text-align:center;color:#e74c3c;font-size:12px;padding:12px;">Scan failed</div>';
            }

            btn.disabled = false;
            btn.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.4-2.4 3.8-5.5 3.8-8.2C24 5.4 18.6 0 12 0S0 5.4 0 12c0 2.7 1.4 5.8 3.8 8.2"/>
                    <path d="M16.9 16.9A7 7 0 0 0 19 12a7 7 0 0 0-7-7 7 7 0 0 0-7 7 7 7 0 0 0 2.1 4.9"/>
                </svg>
                Scan Again`;
        }

        async function selectTv(ip, port, apiVersion, name, el, context) {
            const listId = context === 'setup' ? 'setupTvList' : 'modalTvList';
            document.querySelectorAll(`#${listId} .tv-item`).forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');

            await saveConfig(ip, port, apiVersion);
            localStorage.setItem('tvName', name || 'Philips TV');
            localStorage.setItem('tvApiVersion', apiVersion || '1');
            document.getElementById('tvTitle').textContent = (name || 'PHILIPS TV').toUpperCase();

            if (context === 'setup') {
                document.getElementById('setupScreen').classList.remove('active');
            } else {
                closeSettings();
            }

            await loadTvCapabilities();
            startPolling();
        }

        async function manualConnect(context) {
            const inputId = context === 'setup' ? 'setupIpInput' : 'manualIpInput';
            const ip = document.getElementById(inputId).value.trim();
            if (!ip) return;

            await saveConfig(ip, 1925, 1);

            if (context === 'setup') {
                document.getElementById('setupScreen').classList.remove('active');
            } else {
                closeSettings();
            }

            await loadTvCapabilities();
            startPolling();
        }

        // --- Settings Modal ---

        async function openSettings() {
            const config = await loadConfig();
            const infoEl = document.getElementById('currentTvInfo');

            if (config && config.ip) {
                const name = localStorage.getItem('tvName') || 'Philips TV';
                infoEl.innerHTML = `Connected to: <strong>${name}</strong> (${config.ip}:${config.port})`;
                infoEl.style.display = 'block';
            } else {
                infoEl.style.display = 'none';
            }

            document.getElementById('modalTvList').innerHTML = '';
            document.getElementById('manualIpInput').value = config ? config.ip : '';
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // --- Haptic feedback ---

        function haptic() {
            try {
                if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Haptics) {
                    window.Capacitor.Plugins.Haptics.impact({ style: 'Light' });
                }
            } catch {}
        }

        // --- Button feedback ---

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('touchstart', function() {
                    this.classList.add('flash');
                    haptic();
                }, { passive: true });
                btn.addEventListener('touchend', function() {
                    this.classList.remove('flash');
                }, { passive: true });
            });
        });

        // --- TV Capabilities (dynamic sources + volume range) ---

        function normalizeSources(data) {
            // v6 Android TV: plain array [{id, name, type}]
            if (Array.isArray(data)) {
                return data.map(s => ({ id: s.id, name: s.name || s.id }));
            }
            // v1/v5: {sources: [...]} or {sources: {id: {name}}}
            const raw = data.sources || data;
            if (Array.isArray(raw)) {
                return raw.map(s => ({ id: s.id, name: s.name || s.id }));
            }
            if (raw && typeof raw === 'object') {
                return Object.entries(raw).map(([key, s]) => ({
                    id:   typeof s === 'object' ? (s.id ?? parseInt(key)) : parseInt(key),
                    name: typeof s === 'object' ? (s.name || key) : key,
                }));
            }
            return [];
        }

        async function loadTvCapabilities() {
            try {
                // Load volume range
                const volRes = await fetch(`${getApiBase()}/audio/volume`);
                if (volRes.ok) {
                    const vol = await volRes.json();
                    const max = vol.max || 60;
                    const slider = document.getElementById('volumeSlider');
                    slider.max = max;
                    slider.min = vol.min ?? 0;
                    if (vol.current !== undefined) {
                        slider.value = vol.current;
                        document.getElementById('volumeValue').textContent = vol.current;
                    }
                }
            } catch {}

            try {
                // Load sources dynamically
                const srcRes = await fetch(`${getApiBase()}/sources`);
                if (srcRes.ok) {
                    const data    = await srcRes.json();
                    const sources = normalizeSources(data);
                    renderSources(sources);
                }
            } catch {}
        }

        function renderSources(sources) {
            const grid = document.getElementById('sourcesGrid');
            if (!sources.length) return;
            grid.innerHTML = sources.map(s =>
                `<button class="btn" onclick="setSource(${JSON.stringify(s.id)})">${s.name}</button>`
            ).join('');
            // Re-attach touch feedback for new buttons
            grid.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('touchstart', function() {
                    this.classList.add('flash'); haptic();
                }, { passive: true });
                btn.addEventListener('touchend', function() {
                    this.classList.remove('flash');
                }, { passive: true });
            });
        }

        // --- Remote Controls ---

        function toggleExpand(page) {
            const btn = document.getElementById(page + 'ExpandBtn');
            const content = document.getElementById(page + 'Collapsible');
            const pageEl = document.getElementById(page + 'Page');
            btn.classList.toggle('expanded');
            content.classList.toggle('expanded');
            pageEl.classList.toggle('expanded');
            btn.querySelector('span:first-child').textContent =
                content.classList.contains('expanded') ? 'Less controls' : 'More controls';
        }

        async function sendKey(key) {
            try {
                const response = await fetch(`${getApiBase()}/input/key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                showStatus(response.ok ? 'connected' : 'error', response.ok ? key : 'Error');
            } catch {
                showStatus('error', 'Offline');
            }
        }

        async function setVolume(value) {
            document.getElementById('volumeValue').textContent = value;
            try {
                await fetch(`${getApiBase()}/audio/volume`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current: parseInt(value), muted: false })
                });
                showStatus('connected', `Vol: ${value}`);
            } catch {
                showStatus('error', 'Offline');
            }
        }

        async function setSource(id) {
            try {
                await fetch(`${getApiBase()}/sources/current`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                showStatus('connected', 'Source OK');
            } catch {
                showStatus('error', 'Offline');
            }
        }

        async function getVolume() {
            try {
                const response = await fetch(`${getApiBase()}/audio/volume`);
                if (!response.ok) throw new Error('Bad response');
                const data = await response.json();
                document.getElementById('volumeSlider').value = data.current;
                document.getElementById('volumeValue').textContent = data.current;
                showStatus('connected', 'Connected');
            } catch {
                showStatus('error', 'Offline');
            }
        }

        function showStatus(type, message) {
            const status = document.getElementById('tvStatus');
            status.className = `status ${type}`;
            status.textContent = message;
        }

        // --- Polling with visibility awareness ---

        function startPolling() {
            getVolume();
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(getVolume, VOLUME_POLL_INTERVAL);
        }

        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                startPolling();
            } else {
                stopPolling();
            }
        });

        // --- Init ---

        (async function init() {
            const config = await loadConfig();
            if (config && config.ip) {
                // Sync API version from server into localStorage
                if (config.apiVersion) localStorage.setItem('tvApiVersion', config.apiVersion);
                const name = localStorage.getItem('tvName');
                if (name) document.getElementById('tvTitle').textContent = name.toUpperCase();
                await loadTvCapabilities();
                startPolling();
            } else {
                document.getElementById('setupScreen').classList.add('active');
            }
        })();
    </script>
</body>
</html>
